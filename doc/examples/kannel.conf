#
# KAMEX SMS GATEWAY - SAMPLE CONFIGURATION
#
# Documentation: https://kamex.dev
# Report issues: https://github.com/vaska94/kannel/issues
#

# --- Mreža (IPv4) ---
# Podrazumevano (bez admin-interface / smsbox-interface u core; bez sendsms-interface u smsbox)
# sluša se na SVIM adresama (0.0.0.0) — pristup i preko javne IP servera i preko localhost.
# Za vezivanje SAMO na jednu IP: u core postavite admin-interface i smsbox-interface; u smsbox
# sendsms-interface i bearerbox-host na ISTU tu IP (ne localhost), ako bearer ne sluša na loopback-u.
# admin-interface = "203.0.113.10"
# smsbox-interface = "203.0.113.10"

# CORE CONFIGURATION
group = core
admin-port = 13000
admin-password = bar
# Admin panel sa druge mašine: NEMATE smisla admin-deny-ip + admin-allow-ip = samo 127.0.0.1 (blokira LAN/javni IP).
# Ostavite ove direktive isključene (podrazumevano = svi IP), ili npr. admin-allow-ip = "127.0.0.1;192.168.1.0/24"
#status-password = foo
smsbox-port = 13001
# store + DLR: putanje ispod /var/spool i /var/log odgovaraju systemd servisu (User=kamex, ReadWritePaths)
store-type = file
store-location = "/var/spool/kamex/kamex.store"
dlr-storage = internal
#log-file = "/tmp/kannel.log"
#log-level = 0
#log-format = json

# FAKE SMSC - for testing
# Replace with real SMSC configuration for production
group = smsc
smsc = fake
smsc-id = fake
port = 10000

# SMSBOX CONFIGURATION
group = smsbox
# Isti stroj kao bearerbox: localhost je u redu dok bearer sluša na 0.0.0.0. Inače stavite istu IP kao admin-interface.
bearerbox-host = localhost
sendsms-port = 13013
# sendsms-interface = "203.0.113.10"
#global-sender = 12345
#log-file = "/tmp/smsbox.log"
#log-level = 0
#log-format = json

# SEND-SMS USERS
group = sendsms-user
username = tester
password = foobar

# Admin panel SMS sending - password must match admin-password
group = sendsms-user
username = admin
password = bar

# DEFAULT SMS SERVICE
group = sms-service
keyword = default
text = "No service specified"

